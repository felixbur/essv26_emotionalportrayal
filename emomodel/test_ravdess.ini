[EXP]
root = experiments/essv26_emotionalportrayal/emomodel
name = results
epochs = 100
save = True
[DATA]
databases = ['emodb', 'emovo']
tests = ['train', 'test', 'dev']
emodb = ./data/emodb/emodb
emodb.split_strategy = train
emodb.mapping = {'anger':'angry', 'happiness':'happy', 'sadness':'sad', 'neutral':'neutral', 'boredom':'bored', 'disgust':'disgusted', 'fear':'scared',}
emodb.target_tables = ['emotion.categories.test.gold_standard', 'emotion.categories.train.gold_standard', 'emotion.categories.ambiguous']
emodb.target_tables_append = True
emovo = ./data/emovo/emovo.csv
emovo.type = csv
emovo.absolute_path = False
emovo.split_strategy = train
emovo.mapping = {'anger':'angry', 'happiness':'happy', 'sadness':'sad', 'neutral':'neutral', 'fear':'scared','surprise':'surprised', 'disgust':'disgusted'}
train = ./data/ravdess/ravdess_train.csv
train.type = csv
train.absolute_path = False
train.split_strategy = test
train.mapping = {'angry':'angry', 'happy':'happy', 'sad':'sad', 'neutral':'neutral','fear':'scared'}
dev = ./data/ravdess/ravdess_dev.csv
dev.type = csv
dev.absolute_path = False
dev.split_strategy = test
dev.mapping = {'angry':'angry', 'happy':'happy', 'sad':'sad', 'neutral':'neutral','fear':'scared'}
test = ./data/ravdess/ravdess_test.csv
test.type = csv
test.absolute_path = False
test.split_strategy = test
test.mapping = {'angry':'angry', 'happy':'happy', 'sad':'sad', 'neutral':'neutral','fear':'scared'}
labels = ["happy", "angry", "sad", "scared", "neutral"]
target = emotion
[FEATS]
type = ['audwav2vec2']
[MODEL]
type = mlp
layers = [1024, 64]
patience = 10
